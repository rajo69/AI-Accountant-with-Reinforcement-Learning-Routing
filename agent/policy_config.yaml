ppo:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  total_timesteps: 100000
  policy: MlpPolicy
  net_arch: [64, 64]

training:
  reward_variants: [A, B, C]
  n_eval_episodes: 100
  eval_freq: 5000
  save_freq: 10000
  seed: 42
