name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# This workflow covers the RL routing research extension (agent, api,
# environment, integration). The parent AI Accountant project is no longer
# vendored here; see https://github.com/rajo69/agentic-ai-accounting. Scopes
# are defined in ./pyproject.toml so running ruff/mypy/pytest with no
# arguments is sufficient.
jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=agent --cov=api --cov=environment --cov=integration --cov-report=xml --cov-report=term-missing

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff

      - name: ruff check
        run: ruff check agent api environment integration

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install mypy
        run: pip install mypy types-PyYAML

      - name: mypy
        run: mypy
